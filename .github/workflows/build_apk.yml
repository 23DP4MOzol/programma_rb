name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet supabase
          # Install any other requirements your flet app needs here

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK with Flet
        run: |
          # Make sure your main flet python file is named main_mobile.py or similar
          flet build apk --project RimiInventory
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Zebra-Scanner-App
          path: build/apk/*.apk
