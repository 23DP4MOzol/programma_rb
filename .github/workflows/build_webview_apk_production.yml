name: Build WebView APK Production

on:
  workflow_dispatch:
    inputs:
      rollout_track:
        description: "Rollout track (stable or test)"
        required: true
      version_name:
        description: "Release version name (example: 1.2.3)"
        required: true
      keystore_base64:
        description: Base64-encoded Android release keystore
        required: true
      keystore_password:
        description: Keystore password
        required: true
      key_alias:
        description: Key alias name
        required: true
      key_password:
        description: Key password
        required: true

jobs:
  build-production-signed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Validate production signing secrets
        env:
          ROLLOUT_TRACK: ${{ github.event.inputs.rollout_track }}
          ANDROID_KEYSTORE_BASE64: ${{ github.event.inputs.keystore_base64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ github.event.inputs.keystore_password }}
          ANDROID_KEY_ALIAS: ${{ github.event.inputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ github.event.inputs.key_password }}
        run: |
          if [ "$ROLLOUT_TRACK" != "stable" ] && [ "$ROLLOUT_TRACK" != "test" ]; then
            echo "rollout_track must be 'stable' or 'test'"
            exit 1
          fi

          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing required production signing secret(s)."
            exit 1
          fi

          echo "::add-mask::$ANDROID_KEYSTORE_BASE64"
          echo "::add-mask::$ANDROID_KEYSTORE_PASSWORD"
          echo "::add-mask::$ANDROID_KEY_ALIAS"
          echo "::add-mask::$ANDROID_KEY_PASSWORD"

      - name: Build signed production release APK
        working-directory: android
        env:
          ROLLOUT_TRACK: ${{ github.event.inputs.rollout_track }}
          ANDROID_KEYSTORE_BASE64: ${{ github.event.inputs.keystore_base64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ github.event.inputs.keystore_password }}
          ANDROID_KEY_ALIAS: ${{ github.event.inputs.key_alias }}
          ANDROID_KEY_PASSWORD: ${{ github.event.inputs.key_password }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

          VERSION_NAME="${{ github.event.inputs.version_name }}-${ROLLOUT_TRACK}"

          ../gradle-8.7/bin/gradle :app:assembleRelease \
            --no-daemon \
            -PVERSION_CODE=${GITHUB_RUN_NUMBER} \
            -PVERSION_NAME=${VERSION_NAME} \
            -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD \
            -PMYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS \
            -PMYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD

      - name: Verify signed release artifact
        run: |
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed production APK
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-${{ github.event.inputs.rollout_track }}-signed
          path: android/app/build/outputs/apk/release/app-release.apk
