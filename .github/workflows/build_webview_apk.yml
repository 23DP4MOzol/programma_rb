name: Build WebView APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build APK
        working-directory: android
        run: |
          ../gradle-8.7/bin/gradle :app:assembleDebug --no-daemon

      - name: Build Signed Release APK (if secrets configured)
        id: release_build
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

            ../gradle-8.7/bin/gradle :app:assembleRelease \
              --no-daemon \
              -PVERSION_CODE=${{ github.run_number }} \
              -PVERSION_NAME=1.0.${{ github.run_number }} \
              -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
              -PMYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD \
              -PMYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS \
              -PMYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD

            echo "release_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release APK skipped. Add Android signing secrets to enable signed release builds."
            echo "release_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: steps.release_build.outputs.release_built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-release
          path: android/app/build/outputs/apk/release/app-release.apk
