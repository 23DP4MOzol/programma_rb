name: Build WebView APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build APK
        working-directory: android
        run: |
          ../gradle-8.7/bin/gradle :app:assembleDebug --no-daemon

      - name: Build Release APK (unsigned fallback)
        id: release_build
        continue-on-error: true
        working-directory: android
        run: |
          ../gradle-8.7/bin/gradle :app:assembleRelease \
            --no-daemon \
            -PVERSION_CODE=${{ github.run_number }} \
            -PVERSION_NAME=1.0.${{ github.run_number }}

      - name: Check release artifact
        id: release_apk_check
        if: always()
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=android/app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: always() && steps.release_apk_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-release
          path: ${{ steps.release_apk_check.outputs.path }}
