name: Build WebView APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build APK
        working-directory: android
        run: |
          ../gradle-8.7/bin/gradle :app:assembleDebug --no-daemon

      - name: Prepare debug artifact package
        run: |
          mkdir -p artifacts/debug
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/debug/
          sha256sum artifacts/debug/app-debug.apk | awk '{print $1}' > artifacts/debug/app-debug.apk.sha256
          cat > artifacts/debug/manifest.json <<EOF
          {
            "build_type": "debug",
            "run_number": "${{ github.run_number }}",
            "run_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "apk": "app-debug.apk",
            "checksum_file": "app-debug.apk.sha256"
          }
          EOF

      - name: Build Release APK (unsigned fallback)
        id: release_build
        continue-on-error: true
        working-directory: android
        run: |
          ../gradle-8.7/bin/gradle :app:assembleRelease \
            --no-daemon \
            -PVERSION_CODE=${{ github.run_number }} \
            -PVERSION_NAME=1.0.${{ github.run_number }}

      - name: Check release artifact
        id: release_apk_check
        if: always()
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "name=app-release.apk" >> "$GITHUB_OUTPUT"
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=android/app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
            echo "name=app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release artifact package
        if: always() && steps.release_apk_check.outputs.exists == 'true'
        run: |
          mkdir -p artifacts/release
          cp "${{ steps.release_apk_check.outputs.path }}" "artifacts/release/${{ steps.release_apk_check.outputs.name }}"
          sha256sum "artifacts/release/${{ steps.release_apk_check.outputs.name }}" | awk '{print $1}' > "artifacts/release/${{ steps.release_apk_check.outputs.name }}.sha256"
          cat > artifacts/release/manifest.json <<EOF
          {
            "build_type": "release",
            "run_number": "${{ github.run_number }}",
            "run_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "apk": "${{ steps.release_apk_check.outputs.name }}",
            "checksum_file": "${{ steps.release_apk_check.outputs.name }}.sha256"
          }
          EOF

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-debug
          path: |
            artifacts/debug/app-debug.apk
            artifacts/debug/app-debug.apk.sha256
            artifacts/debug/manifest.json

      - name: Upload Release APK
        if: always() && steps.release_apk_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: RimiInventory-WebView-APK-release
          path: |
            artifacts/release/${{ steps.release_apk_check.outputs.name }}
            artifacts/release/${{ steps.release_apk_check.outputs.name }}.sha256
            artifacts/release/manifest.json
