<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rimi Inventory Scanner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="brand">
          <img class="logo" src="logo_red.png" alt="RIMI logo" />
          <div>
            <div class="brand__name">Rimi Baltic</div>
            <div class="brand__title">Inventory</div>
          </div>
        </div>
        <div class="brand__subtitle">Device tracking</div>
      </header>

      <section class="card card--action">
        <div class="card__head">
          <div>
            <div class="card__title">Action</div>
            <div class="card__subtitle">Scan scanner serial (S + 13/14 digits) or laptop QR first token (e.g. 5CG3285C9K,...)</div>
          </div>
          <div class="card__status-wrap">
            <div class="card__status" id="status"></div>
            <div class="card__queue" id="queueStatus"></div>
          </div>
        </div>

        <label class="label" for="serial">Serial (scan here)</label>
        <input id="serial" class="input input--large" type="text" inputmode="text" autocomplete="off" maxlength="20" placeholder="S12345678901234 or 5CG3285C9K" />

        <div class="grid">
          <div>
            <label class="label" for="type">Type</label>
            <select id="type" class="input">
              <option value="scanner">Scanner</option>
              <option value="laptop">Laptop</option>
              <option value="tablet">Tablet</option>
              <option value="phone">Phone</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="label" for="statusSelect">Status</label>
            <select id="statusSelect" class="input">
              <option value="RECEIVED">Received</option>
              <option value="PREPARING">Preparing</option>
              <option value="PREPARED">Prepared</option>
              <option value="SENT">Sent</option>
              <option value="IN_USE">In use</option>
              <option value="RETURNED">Returned</option>
              <option value="RETIRED">Retired</option>
            </select>
          </div>
          <div>
            <label class="label" for="make">Make</label>
            <input id="make" class="input" type="text" />
          </div>
          <div>
            <label class="label" for="model">Model</label>
            <input id="model" class="input" type="text" />
          </div>
          <div>
            <label class="label" for="fromStore">From store</label>
            <input id="fromStore" class="input" type="text" />
          </div>
          <div>
            <label class="label" for="toStore">To store</label>
            <input id="toStore" class="input" type="text" />
          </div>
        </div>

        <label class="label" for="comment">Comment</label>
        <input id="comment" class="input" type="text" />

        <div class="actions">
          <div class="actions__buttons">
            <button id="save" class="btn primary">Save / Update</button>
            <button id="clear" class="btn">Clear</button>
          </div>
        </div>
      </section>

      <section class="card" id="devicesCard">
        <div class="card__head">
          <div>
            <div class="card__title">Devices</div>
            <div class="card__subtitle">Read-only list from database</div>
          </div>
          <div class="card__head-actions">
            <div class="card__status" id="listStatus"></div>
            <button id="syncNow" class="btn btn--small">Sync now</button>
            <button id="refreshList" class="btn btn--small">Refresh</button>
            <button id="exportCsv" class="btn btn--small">Export CSV</button>
          </div>
        </div>
        <div class="list-tools">
          <div class="lookup-row">
            <input id="lookupSerial" class="input" type="text" maxlength="20" placeholder="Find exact serial (S18167522504743 / 18167522504743 / 5CG3285C9K)" />
            <button id="lookupLoad" class="btn btn--small">Load</button>
          </div>
          <input id="listFilter" class="input" type="text" placeholder="Filter by serial/model/status" />
        </div>
        <div class="table">
          <div class="row row--head">
            <span>Serial</span>
            <span>Type</span>
            <span>Model</span>
            <span>Status</span>
            <span>From</span>
            <span>To</span>
            <span>Comment</span>
          </div>
          <div id="devicesList" class="rows"></div>
        </div>
      </section>

      <footer class="footer">
        <div>Hosted on GitHub Pages</div>
        <div class="footer__meta">
          <span id="appVersion">Version: web-2026.04.07</span>
          <span id="syncInfo">Sync: waiting</span>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
